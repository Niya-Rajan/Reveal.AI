<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reveal.AI Intro</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  overflow: hidden;
  background: #000;
}

/* Fullscreen video */
video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Logo inside pupil */
.logo {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  width: 280px;
  opacity: 0;
  transition: transform 1.6s ease, opacity 1s ease;
  z-index: 5;
  filter: drop-shadow(0 0 40px rgba(255,255,255,0.6));
}

.logo.show {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}

.logo.expand {
  transform: translate(-50%, -50%) scale(7);
  opacity: 0;
}

/* Fade to black */
.fade {
  position: fixed;
  inset: 0;
  background: #000;
  opacity: 0;
  transition: opacity 0.8s ease;
  z-index: 10;
}

.fade.active {
  opacity: 1;
}
</style>
</head>

<body>

<!-- 🔥 YOUR ANIMATION VIDEO -->
<video id="introVideo" autoplay muted playsinline>
  <source src="eye animation.mp4" type="video/mp4">
</video>

<!-- Logo (hidden initially) -->
<img src="bg removed.png" id="logo" class="logo">

<div id="fade" class="fade"></div>

<script>
const video = document.getElementById("introVideo");
const logo = document.getElementById("logo");
const fade = document.getElementById("fade");

/* Wait until video ENDS */
video.addEventListener("ended", () => {

  // 1️⃣ Small delay after eye opens (if animation shows opening)
  setTimeout(() => {
    logo.classList.add("show");
  }, 500);

  // 2️⃣ Expand logo
  setTimeout(() => {
    logo.classList.add("expand");
  }, 2000);

  // 3️⃣ Fade to black
  setTimeout(() => {
    fade.classList.add("active");
  }, 2600);

  // 4️⃣ Redirect
  setTimeout(() => {
    window.location.href = "index.html";
  }, 3300);

});
</script>

</body>
</html>
